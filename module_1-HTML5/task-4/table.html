<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>
</head>

<body>
    <table border="1" cellpadding="10" cellspacing="0">
        <caption>Past Community Events Gallery</caption>
        <tr>
            <td>
                <figure>
                    <img src="images/community-cleanup.svg" alt="Volunteers cleaning a community park"
                        title="Community Cleanup Drive" width="220" height="140" border="4">
                    <figcaption>Community Cleanup Drive</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="images/food-festival.svg" alt="Food stalls at a neighborhood festival"
                        title="Neighborhood Food Festival" width="220" height="140" border="4">
                    <figcaption>Neighborhood Food Festival</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="images/charity-run.svg" alt="People participating in a charity run"
                        title="Annual Charity Run" width="220" height="140" border="4">
                    <figcaption>Annual Charity Run</figcaption>
                </figure>
            </td>
        </tr>
        <tr>
            <td>
                <figure>
                    <img src="images/art-workshop.svg" alt="Children painting during an art workshop"
                        title="Children's Art Workshop" width="220" height="140" border="4">
                    <figcaption>Children's Art Workshop</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="images/music-night.svg" alt="Musicians performing at an outdoor event"
                        title="Community Music Night" width="220" height="140" border="4">
                    <figcaption>Community Music Night</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="images/health-camp.svg" alt="A community health checkup camp"
                        title="Health Awareness Camp" width="220" height="140" border="4">
                    <figcaption>Health Awareness Camp</figcaption>
                </figure>
            </td>
        </tr>
    </table>
</body>

</html>
