<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            color: black;
            padding: 4px 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1 class="highlight">Welcome to the page</h1>
        <p>
            <span style="color: red; font-weight: bold;">Welcome to the page</span>
        </p>
    </div>

    <p class="highlight">Welcome to the page</p>
</body>
</html>
