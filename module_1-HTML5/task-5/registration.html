<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>
</head>
<body>
    <h1>Event Registration Form</h1>

    <form onsubmit="showConfirmation(event)">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required autofocus><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required><br><br>

        <label for="eventDate">Date:</label><br>
        <input type="date" id="eventDate" name="eventDate" required><br><br>

        <label for="eventType">Event Type:</label><br>
        <select id="eventType" name="eventType" required>
            <option value="">Select an event type</option>
            <option value="cleanup">Community Cleanup</option>
            <option value="festival">Food Festival</option>
            <option value="workshop">Art Workshop</option>
            <option value="health">Health Camp</option>
        </select><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your message here" required></textarea><br><br>

        <input type="submit" value="Register">
    </form>

    <output id="confirmationMessage"></output>

    <script>
        function showConfirmation(event) {
            event.preventDefault();

            var name = document.getElementById("name").value;
            var eventType = document.getElementById("eventType");
            var selectedEvent = eventType.options[eventType.selectedIndex].text;

            document.getElementById("confirmationMessage").textContent =
                "Thank you, " + name + ". Your registration for " + selectedEvent + " has been received.";
        }
    </script>
</body>
</html>
