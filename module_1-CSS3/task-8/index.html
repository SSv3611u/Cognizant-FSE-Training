<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Box Model Practice</h2>

    <div class="eventCard">
        <h3>Art Workshop</h3>
        <p>This card has margin, padding and border.</p>
    </div>

    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" class="selectedField">
    </form>

    <p class="hiddenBox">This takes space but it is hidden.</p>
    <p class="noneBox">This is not displayed and takes no space.</p>
    <p>This text shows the difference after hidden and none elements.</p>
</body>
</html>
