<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Alignment and Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Center Alignment</h1>
        <div class="row justify-content-center align-items-center bg-light" style="height: 180px;">
            <div class="col-6 text-center bg-primary text-white p-3">Centered Content</div>
        </div>

        <h2 class="mt-4">Column Reorder</h2>
        <div class="row">
            <div class="col-md-6 order-md-2 bg-warning p-3">This comes second in code but first on desktop</div>
            <div class="col-md-6 order-md-1 bg-info p-3">This comes first in code but second on desktop</div>
        </div>
    </div>
</body>
</html>
