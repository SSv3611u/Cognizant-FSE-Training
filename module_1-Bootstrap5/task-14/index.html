<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Display Visibility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Display and Visibility</h1>

        <div class="d-none d-md-block bg-info p-3 mb-3">
            This block is hidden on mobile and shown from medium screen.
        </div>

        <div class="d-none d-lg-flex bg-warning p-3 mb-3">
            This section becomes flex only on large screens.
        </div>

        <div class="row">
            <aside class="col-md-3 d-none d-md-block bg-light p-3">
                Sidebar visible on tablet and above
            </aside>
            <main class="col-md-9 p-3">
                Main content visible on all screens
            </main>
        </div>
    </div>
</body>
</html>
