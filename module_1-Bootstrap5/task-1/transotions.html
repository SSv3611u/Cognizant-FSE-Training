<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rectangle to Circle Transition</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
        }

        .shape {
            width: 220px;
            height: 120px;
            background-color: #2563eb;
            border-radius: 8px;
            transition: width 0.6s ease, height 0.6s ease, border-radius 0.6s ease, background-color 0.6s ease;
        }

        .shape:hover {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background-color: #16a34a;
        }
    </style>
</head>
<body>
    <div class="shape"></div>
</body>
</html>
