<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Borders and Shadows</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Borders and Rounded Corners</h1>

        <img src="avatar.svg" class="border border-primary border-3 rounded-circle mb-4" width="150" height="150" alt="avatar">

        <div class="card shadow-lg rounded-4 p-3" style="max-width: 350px;">
            <div class="card-body">
                <h5 class="card-title">Premium Pass</h5>
                <p class="card-text">Large shadow and rounded card example.</p>
                <span class="badge text-bg-primary rounded-pill">Featured</span>
            </div>
        </div>
    </div>
</body>
</html>
