<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Column Layouts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Two Column Layout</h1>
        <div class="row mb-4">
            <aside class="col-md-3 bg-light p-3">Sidebar menu</aside>
            <main class="col-md-9 bg-body-secondary p-3">Main content area</main>
        </div>

        <h2>Four Equal Columns</h2>
        <div class="row text-center">
            <div class="col-sm-3 p-3 bg-primary text-white">One</div>
            <div class="col-sm-3 p-3 bg-success text-white">Two</div>
            <div class="col-sm-3 p-3 bg-warning">Three</div>
            <div class="col-sm-3 p-3 bg-info">Four</div>
        </div>
    </div>
</body>
</html>
