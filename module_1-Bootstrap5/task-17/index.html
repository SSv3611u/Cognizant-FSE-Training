<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Icons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Icon Buttons</h1>

        <button class="btn btn-primary" title="search">
            <i class="bi bi-search"></i>
        </button>
        <button class="btn btn-success" title="save">
            <i class="bi bi-check-lg"></i>
        </button>
        <button class="btn btn-danger" title="delete">
            <i class="bi bi-trash"></i>
        </button>
    </div>

    <footer class="bg-dark text-white text-center p-3">
        <a class="text-white me-3" href="#"><i class="bi bi-facebook"></i></a>
        <a class="text-white me-3" href="#"><i class="bi bi-twitter-x"></i></a>
        <a class="text-white" href="#"><i class="bi bi-instagram"></i></a>
    </footer>
</body>
</html>
