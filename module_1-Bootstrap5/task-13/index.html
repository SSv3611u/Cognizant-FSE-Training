<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Colors and Backgrounds</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Dashboard</h1>
        <div class="row g-3">
            <div class="col-md-3"><div class="bg-primary text-white p-3">Total Events</div></div>
            <div class="col-md-3"><div class="bg-warning p-3">Pending</div></div>
            <div class="col-md-3"><div class="bg-success text-white p-3">Approved</div></div>
            <div class="col-md-3"><div class="bg-danger text-white p-3">Cancelled</div></div>
        </div>

        <div class="bg-dark bg-gradient text-white p-4 mt-4">
            Gradient dark section with white text.
        </div>
    </div>
</body>
</html>
