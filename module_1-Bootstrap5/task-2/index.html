<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Files</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Bootstrap Structure</h1>
        <ul class="list-group">
            <li class="list-group-item"><b>css</b> folder contains bootstrap styles.</li>
            <li class="list-group-item"><b>js</b> folder contains bootstrap plugins.</li>
            <li class="list-group-item"><b>icons</b> folder contains bootstrap icon files.</li>
        </ul>

        <button class="btn btn-primary mt-3" data-bs-toggle="collapse" data-bs-target="#demo">
            Test Bootstrap JS
        </button>
        <div id="demo" class="collapse mt-3">
            Bootstrap bundle JS is working.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
