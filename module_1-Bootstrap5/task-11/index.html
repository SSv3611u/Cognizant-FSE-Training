<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cards and Media</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Profile Card</h1>
        <div class="card mb-4" style="width: 18rem;">
            <img src="profile.svg" class="card-img-top" alt="profile image">
            <div class="card-body">
                <h5 class="card-title">Ravi Kumar</h5>
                <p class="card-text">Event coordinator for community programs.</p>
                <a href="#" class="btn btn-primary">View Profile</a>
            </div>
        </div>

        <h2>Media Object Layout</h2>
        <div class="d-flex align-items-start">
            <img src="profile.svg" width="90" class="me-3" alt="small profile image">
            <div>
                <h5>Volunteer Team</h5>
                <p>The team helps residents during local events and public programs.</p>
            </div>
        </div>
    </div>
</body>
</html>
