<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spacing Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <section class="m-3 mt-4 p-2 bg-light">
        <h1>Spacing Practice</h1>
        <p class="py-5">This section uses bootstrap margin and padding utilities.</p>
    </section>

    <div class="container py-5">
        <h2 class="mb-4">Pricing Section</h2>
        <div class="row g-4">
            <div class="col-md-4">
                <div class="border p-4 text-center">
                    <h3>Free</h3>
                    <p>Basic entry</p>
                    <button class="btn btn-outline-primary">Choose</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border p-4 text-center">
                    <h3>Standard</h3>
                    <p>Reserved seat</p>
                    <button class="btn btn-primary">Choose</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="border p-4 text-center">
                    <h3>Premium</h3>
                    <p>Front row seat</p>
                    <button class="btn btn-dark">Choose</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
