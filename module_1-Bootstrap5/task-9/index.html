<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Bootstrap Buttons</h1>
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-secondary">Secondary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
        <button class="btn btn-warning">Warning</button>
        <button class="btn btn-info">Info</button>
        <button class="btn btn-outline-primary">Outline</button>
        <button class="btn btn-outline-dark">Outline Dark</button>

        <h2 class="mt-4">Button Group</h2>
        <div class="btn-group">
            <button class="btn btn-outline-secondary">Day</button>
            <button class="btn btn-outline-secondary">Week</button>
            <button class="btn btn-outline-secondary">Month</button>
        </div>

        <h2 class="mt-4">Toggle Buttons</h2>
        <input type="checkbox" class="btn-check" id="clean">
        <label class="btn btn-outline-success" for="clean">Cleanup</label>

        <input type="checkbox" class="btn-check" id="food">
        <label class="btn btn-outline-success" for="food">Food</label>
    </div>
</body>
</html>
