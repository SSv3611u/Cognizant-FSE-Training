<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Plugins</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1>Modal and Accordion</h1>

        <button class="btn btn-primary mb-4" data-bs-toggle="modal" data-bs-target="#eventModal">
            Open Modal
        </button>

        <div class="modal fade" id="eventModal" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Event Notice</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        Registration is open for this event.
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion" id="eventAccordion">
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#itemOne">
                        What is the event time?
                    </button>
                </h2>
                <div id="itemOne" class="accordion-collapse collapse show" data-bs-parent="#eventAccordion">
                    <div class="accordion-body">The event starts at 10 AM.</div>
                </div>
            </div>
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#itemTwo">
                        Is registration needed?
                    </button>
                </h2>
                <div id="itemTwo" class="accordion-collapse collapse" data-bs-parent="#eventAccordion">
                    <div class="accordion-body">Yes, residents should register before attending.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
